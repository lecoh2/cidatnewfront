@if (mensagens.length > 0) {
  <div
    class="alert alert-{{tipo}} alert-outline-coloured alert-dismissible"
    role="alert">
    <button type="button"
      class="btn-close"
      data-bs-dismiss="alert"
      aria-label="Close"
      (click)="fecharMensagem()">
    </button>
    <div class="alert-icon">
      <i [ngClass]="icone"></i>
    </div>
    <div class="alert-message">
      @for (msg of mensagens; track msg) {
        <div>{{ msg }}</div>
      }
    </div>
  </div>
}
