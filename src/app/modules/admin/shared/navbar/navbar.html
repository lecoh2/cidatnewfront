<nav class="navbar navbar-expand navbar-bg">
    <a class="sidebar-toggle">
        <i class="hamburger align-self-center"></i>
    </a>



    <div class="navbar-collapse collapse">
        <ul class="navbar-nav navbar-align">
            <li class="nav-item dropdown">
                <a class="nav-icon dropdown-toggle" href="#" id="messagesDropdown" data-bs-toggle="dropdown">
                    <div class="position-relative">

                        <i class="fas fa-bell align-middle text-body"></i>

                        <span class="indicator bg-danger text-white" *ngIf="lembretes?.length">
                            {{ lembretes.length }}
                        </span>
                    </div>
                </a>
                <div class="dropdown-menu dropdown-menu-lg dropdown-menu-end py-0" aria-labelledby="messagesDropdown">

                    <!-- HEADER -->
                    <div class="dropdown-menu-header">
                        <div class="position-relative">

                            {{ lembretes.length }}
                            Lembrete(s)

                        </div>
                    </div>

                    <!-- SEM LEMBRETES -->
                    <div *ngIf="!lembretes?.length" class="p-3 text-center text-muted">

                        Nenhum lembrete encontrado

                    </div>

                    <!-- LISTA -->
                    <div class="list-group" *ngIf="lembretes?.length">

                        <a class="list-group-item list-group-item-action" *ngFor="let item of lembretes"
                            [routerLink]="obterLinkLembrete(item)">

                            <div class="row g-0 align-items-center">

                                <!-- ÍCONE -->
                                <div class="col-2 text-center">

                                    <!-- EVENTO -->
                                    <div *ngIf="item.tipo === 'Evento'"
                                        class="rounded-circle bg-primary d-flex align-items-center justify-content-center mx-auto"
                                        style="width:40px;height:40px;">

                                        <i class="fas fa-calendar text-white"></i>

                                    </div>

                                    <!-- TAREFA -->
                                    <div *ngIf="item.tipo === 'Tarefa'"
                                        class="rounded-circle bg-success d-flex align-items-center justify-content-center mx-auto"
                                        style="width:40px;height:40px;">

                                        <i class="fas fa-tasks text-white"></i>

                                    </div>

                                </div>

                                <!-- CONTEÚDO -->
                                <div class="col-10 ps-2">

                                    <!-- TÍTULO -->
                                    <div>

                                        <strong>
                                            {{ item.titulo }}
                                        </strong>

                                    </div>

                                    <!-- BADGES -->
                                    <div class="mt-1">

                                        <!-- CATEGORIA -->
                                        <span class="badge me-1" [ngClass]="{
                'bg-success': item.categoria === 'Hoje',
                'bg-warning text-dark': item.categoria === 'Amanhã',
                'bg-primary': item.categoria === 'Próximos'
              }">

                                            {{ item.categoria }}

                                        </span>

                                        <!-- RECORRENTE -->
                                        <span *ngIf="item.recorrente" class="badge bg-info me-1">

                                            Recorrente

                                        </span>

                                        <!-- DIA INTEIRO -->
                                        <span *ngIf="item.diaInteiro" class="badge bg-dark">

                                            Dia inteiro

                                        </span>

                                    </div>

                                    <!-- DATA -->
                                    <div class="text-muted small mt-1">

                                        <i class="fas fa-clock me-1"></i>

                                        {{ item.data | date:'dd/MM/yyyy HH:mm' }}

                                    </div>

                                </div>

                            </div>

                        </a>

                    </div>

                    <!-- FOOTER 
                    <div class="dropdown-menu-footer">

                        <a href="#" class="text-muted">

                            Ver todos os lembretes

                        </a>

                    </div>-->

                </div>
            </li>

            <!-- HTML -->



            <li class="nav-item nav-theme-toggle dropdown">
                <a class="nav-icon js-theme-toggle" href="#" (click)="toggleTheme(); $event.preventDefault()">
                    <div class="position-relative">
                        <i class="align-middle text-body nav-theme-toggle-light fas fa-fw fa-sun"></i>
                        <i class="align-middle text-body nav-theme-toggle-dark fas fa-fw fa-moon"></i>
                    </div>
                </a>
            </li>
            <li class="nav-item dropdown">
                <a class="nav-icon dropdown-toggle d-inline-block d-sm-none" href="#" data-bs-toggle="dropdown">
                    <i class="align-middle" data-lucide="settings"></i>
                </a>

                <a class="nav-link dropdown-toggle d-none d-sm-inline-block" href="#" data-bs-toggle="dropdown">


                    <img [src]="fotoUsuario" (error)="fotoUsuario='assets/appdeslandes/img/default-avatar.jpg'"
                        alt="Foto do usuário"
                        class="img-fluid rounded-circle border border-light border-2 me-1 mt-n2 mb-n2"
                        style="width: 40px; height: 40px; object-fit: cover;">
                    <span>{{ nomeUsuario.split(' ')[0] }}</span>
                    <!--<span>{{ nomeUsuario.split(' ').slice(0, 2).join(' ') }}</span>-->
                </a>
                <div class="dropdown-menu dropdown-menu-end">
                    <a class="dropdown-item" [routerLink]="['/admin', 'perfil']">
                        <i class="fa-solid fa-user me-2"></i>
                        Perfil
                    </a>


                    <div class="dropdown-divider"></div>



                    <button class="dropdown-item" (click)="logout()">
                        <i class="fa-solid fa-right-from-bracket me-2"></i>
                        Sair do sistema
                    </button>



                </div>
            </li>
        </ul>
    </div>
</nav>
