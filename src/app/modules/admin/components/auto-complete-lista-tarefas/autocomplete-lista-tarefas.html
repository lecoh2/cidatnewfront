<div class="position-relative">

<h5 class="card-title mb-2">{{ label }}</h5>
  <input type="text"
         class="form-control shadow-sm"
         [placeholder]="placeholder"
         [formControl]="control"
         (input)="onBuscar()"
         (focus)="mostrarSugestoes = true"
         (blur)="ocultarComDelay()" />

  <!-- SUGESTÕES -->
  <ul *ngIf="mostrarSugestoes && resultados.length > 0"
      class="list-group position-absolute w-100 shadow-sm mt-1 zindex-dropdown">

    <li *ngFor="let l of resultados"
        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
        (mousedown)="selecionar(l)">

      <div class="d-flex flex-column">
        <strong>{{ l.descricao }}</strong>
        <small class="text-muted">
          Usos: {{ l.quantidade }}
        </small>
      </div>

      <i class="fas fa-plus text-primary"></i>
    </li>
  </ul>

  <!-- SELECIONADOS -->
  <div *ngIf="selecionadas.length > 0" class="mt-3">

    <h6 class="text-muted mb-2">Selecionados:</h6>

    <div class="d-flex flex-column gap-2">

      <div *ngFor="let l of selecionadas"
           class="d-flex justify-content-between align-items-center border-bottom py-2">

        <div>
          <strong>{{ l.descricao }}</strong>
        </div>

        <button type="button"
                class="btn btn-sm btn-link text-danger"
                (click)="remover(l)">
          <i class="fas fa-trash"></i>
        </button>

      </div>

    </div>
  </div>

</div>
