<div class="position-relative">

  <input type="text"
         class="form-control shadow-sm"
         placeholder="Buscar responsável"
         [formControl]="control"
         (focus)="aberto = true" />

  <!-- DROPDOWN (igual ao que você gostou) -->
  <ul *ngIf="aberto && resultados.length > 0"
      class="list-group position-absolute w-100 shadow-sm mt-1 zindex-dropdown autocomplete-dropdown">

    <li *ngFor="let r of resultados"
        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center hover-click"
        (click)="selecionar(r)">

      <div class="d-flex flex-column flex-grow-1">
        <strong>{{ r.nomeUsuario }}</strong>
      </div>

     <i *ngIf="isSelecionado(r)" class="fas fa-check text-success"></i>
<i *ngIf="!isSelecionado(r)" class="fas fa-plus text-primary"></i>
    </li>

  </ul>

  <!-- SELECIONADOS (mantém seu estilo de badge que você gostou) -->
  <div class="mt-2 d-flex flex-wrap gap-2">
    <span *ngFor="let r of selecionadas"
          class="badge bg-primary d-flex align-items-center px-3 py-2">

      {{ r.nomeUsuario }}

      <i class="fas fa-trash ms-2"
         style="cursor:pointer"
         (click)="remover(r)"></i>
    </span>
  </div>

</div>
