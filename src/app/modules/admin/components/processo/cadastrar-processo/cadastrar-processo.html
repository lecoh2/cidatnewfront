<div class="container-fluid p-0">
    <h1 class="h3 mb-3">Cadastrar Processo</h1>

    <div class="card">
        <div class="card-header">
            <h5 class="card-title">Cadastro de Processo</h5>
            <h6 class="card-subtitle text-muted">Preencha os dados do processo</h6>
        </div>

        <div class="card-body">

            <!-- SPINNER -->
            <app-spinner *ngIf="carregando" [show]="true" message="Salvando..."></app-spinner>

            <!-- ALERTAS -->
            <app-alerts *ngIf="!carregando && mensagemSucesso.length" titulo="Sucesso!" [mensagens]="mensagemSucesso"
                tipo="success">
            </app-alerts>

            <app-alerts *ngIf="!carregando && mensagemErro.length" titulo="Erro!" [mensagens]="mensagemErro"
                tipo="danger">
            </app-alerts>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                <!-- ================= ETIQUETAS ================= -->

                <div class="mb-3">
                    <label class="form-label">Etiquetas</label>

                    <app-etiquetas [etiquetas]="tiposetiquetas" [(selecionadas)]="etiquetasSelecionadas">
                    </app-etiquetas>
                </div>
                <!-- ================= DADOS DO PROCESSO ================= -->
                <h5 class="mb-3">Dados do Processo</h5>
                <div class="col-md-3">
                    <label class="form-label">
                        Quantidade de Atendimentos
                    </label>


                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Pasta</label>
                        <input class="form-control" formControlName="pasta">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Número do Processo</label>
                        <input class="form-control" formControlName="numeroProcesso" mask="000/000000/0000">
                    </div>
                </div>

                <div class="row mb-3">
                    <!-- CLIENTES -->
                    <div class="col-md-6">
                        <app-autocomplete-pessoa label="Clientes" placeholder="Digite o nome do cliente"
                            [resultados]="pessoasFiltradas" [(selecionadas)]="pessoasSelecionadas"
                            [qualificacoes]="qualificacoes" (buscar)="buscarPessoas($event)">
                        </app-autocomplete-pessoa>
                    </div>

                    <!-- ENVOLVIDOS -->
                    <div class="col-md-6">
                        <app-autocomplete-pessoa label="Outros" placeholder="Digite o nome do envolvido"
                            [resultados]="envolvidosFiltradas" [(selecionadas)]="envolvidosSelecionados"
                            [qualificacoes]="qualificacoes" (buscar)="buscarEnvolvidos($event)">
                        </app-autocomplete-pessoa>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Assunto</label>
                        <input class="form-control" formControlName="titulo">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Responsável</label>
                        <select class="form-control" formControlName="usuarioResponsavelId">
                            <option [ngValue]="null">Selecione</option>
                            <option *ngFor="let user of responsaveis" [ngValue]="user.id">
                                {{ user.nomeUsuario }}
                            </option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">

                    <div class="col-md-3">
                        <label class="form-label">Data de Distribuição</label>
                        <input type="date" class="form-control" formControlName="distribuido">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Tipo do Processo</label>

                        <select class="form-select" formControlName="tipoProcesso">

                            <option [ngValue]="null">Selecione</option>

                            <option [ngValue]="1">URGENTE</option>
                            <option [ngValue]="2">PEDIDO</option>
                            <option [ngValue]="3">RETORNO DO GABINETE</option>
                            <option [ngValue]="4">RETORNO CORREÇÃO</option>
                        </select>
                    </div>              
              
                    <div class="col-md-6">
                        <label class="form-label">
                            Localização Inicial
                        </label>

                        <select class="form-select" formControlName="localizacaoInicialId">

                            <option [ngValue]="null">
                                Selecione
                            </option>

                            <option *ngFor="let l of locais" [ngValue]="l.id">

                                {{ l.local }}

                            </option>

                        </select>
                    </div>
                </div>


                <div class="row mb-3">
                    <div class="col-md-12">
                        <label class="form-label">Observação (máximo 20 caracteres)</label>

                        <textarea class="form-control" rows="3" formControlName="observacao" maxlength="20">
                        </textarea>

                    </div>

                </div>

                <div class="col-md-6">
                    <label class="form-label">Acesso</label>

                    <div class="d-flex gap-4">

                        <div class="form-check">
                            <input class="form-check-input" type="radio" formControlName="acesso"
                                [value]="acessoEnum.Publico" id="acessoPublico">

                            <label class="form-check-label" for="acessoPublico">
                                Público
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" formControlName="acesso"
                                [value]="acessoEnum.Privado" id="acessoPrivado">

                            <label class="form-check-label" for="acessoPrivado">
                                Privado
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" formControlName="acesso"
                                [value]="acessoEnum.Envolvidos" id="acessoEnvolvidos">

                            <label class="form-check-label" for="acessoEnvolvidos">
                                Envolvidos
                            </label>
                        </div>

                    </div>
                </div>

                <!-- BOTÃO -->
                <button type="submit" class="btn btn-primary mt-3" [disabled]="carregando">
                    <i class="fas fa-save"></i> Salvar Processo
                </button>

            </form>

        </div>
    </div>
</div>
