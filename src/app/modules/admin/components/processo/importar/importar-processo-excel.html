<div class="container mt-4">

  <div class="card shadow-sm border-0">

    <div class="card-body">

      <h3 class="fw-bold mb-2">
        <i class="fas fa-file-import text-primary me-2"></i>
        Importar Processos
      </h3>

      <p class="text-muted mb-4">
        Faça upload do arquivo Excel/CSV para importar processos em lote.
      </p>

      <!-- SPINNER -->
      <app-spinner
        *ngIf="carregando"
        [show]="true"
        message="Importando processos...">
      </app-spinner>

      <!-- ALERTAS -->
 <app-alerts
  *ngIf="!carregando && mensagemSucesso.length"
  titulo="Sucesso!"
  [mensagens]="mensagemSucesso"
  tipo="success"
  icone="fas fa-check-circle">
</app-alerts>

<app-alerts
  *ngIf="!carregando && mensagemErro.length"
  titulo="Erro!"
  [mensagens]="mensagemErro"
  tipo="danger"
  icone="fas fa-times-circle">
</app-alerts>

      <!-- INPUT -->
      <input
        type="file"
        class="form-control"
        (change)="onFileSelected($event)"
        accept=".xlsx,.xls,.csv" />

      <!-- BOTÕES -->
      <div class="mt-4 d-flex gap-2">

        <button
          class="btn btn-primary"
          (click)="enviar()"
          [disabled]="!arquivo || carregando">

          <i class="fas fa-upload me-2"></i>

          {{ carregando ? 'Importando...' : 'Importar' }}

        </button>

        <button
          class="btn btn-outline-secondary"
          (click)="limpar()">

          <i class="fas fa-broom me-2"></i>

          Limpar

        </button>

      </div>

      <!-- NOME ARQUIVO -->
      <div *ngIf="arquivo" class="mt-3">

        <span class="badge bg-light text-dark border">

          <i class="fas fa-file-excel text-success me-2"></i>

          {{ arquivo.name }}

        </span>

      </div>

    </div>

  </div>

</div>
