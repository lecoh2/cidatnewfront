<div class="card flex-fill">

  <!-- HEADER -->
  <div class="card-header bg-transparent border-0">

    <h5 class="card-title mb-0 fw-semibold">

      <i class="fas fa-map-marker-alt text-primary me-2"></i>

      Histórico de Localizações

    </h5>

  </div>

  <div class="card-body">

    <!-- SEM DADOS -->
    <div
      *ngIf="!localizacoesOrdenadas?.length"
      class="text-center text-muted py-3">

      Nenhuma localização encontrada

    </div>

    <!-- LISTA -->
    <ul
      *ngIf="localizacoesOrdenadas?.length"
      class="list-unstyled m-0">

      <li
        *ngFor="let item of localizacoesOrdenadas"
        class="position-relative border-start ps-4 mb-3">

        <!-- 🔵 BOLINHA -->
        <span
          class="position-absolute top-0 start-0 translate-middle-x rounded-circle"
          [ngClass]="item.atual ? 'bg-success' : 'bg-primary'"
          style="width:10px;height:10px;margin-left:-6px;margin-top:6px;">
        </span>

        <!-- CONTEÚDO -->

        <!-- LINHA 1 -->
        <div class="d-flex justify-content-between align-items-center">

          <div class="fw-semibold">

            <i class="fas fa-building text-primary me-1"></i>

            {{ item.local }}

          </div>

          <span
            class="badge"
            [ngClass]="item.atual ? 'bg-success' : 'bg-secondary'">

            {{ item.atual ? 'Atual' : 'Anterior' }}

          </span>

        </div>

        <!-- LINHA 2 -->
        <div class="text-muted small mt-1">

          {{ item.observacao || 'Sem observação' }}

        </div>

        <!-- LINHA 3 -->
        <div class="text-muted small">

          <i class="fas fa-clock me-1"></i>

          {{ formatarData(item.dataSaida) }}

        </div>

      </li>

    </ul>

  </div>

</div>
