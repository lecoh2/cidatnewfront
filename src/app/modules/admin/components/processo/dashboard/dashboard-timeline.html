<div class="card flex-fill">

  <!-- HEADER -->
  <div class="card-header">

    <div class="d-flex justify-content-between align-items-center">

      <h5 class="card-title mb-0">

        Timeline de Atendimentos

      </h5>

      <span class="badge bg-primary">

        {{ timelineOrdenada.length }}

      </span>

    </div>

  </div>

  <!-- BODY -->
  <div class="card-body">

    <!-- SEM DADOS -->
    <div
      *ngIf="!timelineOrdenada.length"
      class="text-center text-muted py-4">

      Nenhum atendimento encontrado

    </div>

    <!-- TIMELINE -->
    <ul
      *ngIf="timelineOrdenada.length"
      class="timeline">

      <li
        class="timeline-item"
        *ngFor="let item of timelineOrdenada">

        <!-- TOPO -->
        <div
          class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">

          <!-- CLIENTE -->
          <span
            class="badge rounded-pill badge-subtle-success px-3 py-2">

            <strong>

              {{ obterIniciais(item.nome) }}

            </strong>

            -

            {{ item.nome }}

          </span>

          <!-- TOTAL -->
          <span
            class="badge"
            [ngClass]="{
              'badge-subtle-danger':
                item.totalAtendimentos >= 10,

              'badge-subtle-warning':
                item.totalAtendimentos >= 5 &&
                item.totalAtendimentos < 10,

              'badge-subtle-primary':
                item.totalAtendimentos < 5
            }">

            {{ item.totalAtendimentos }}
            atendimento(s)

          </span>

        </div>

        <!-- DATA -->
        <div
          class="d-flex align-items-center gap-2">

          <strong>

            Último atendimento:

          </strong>

          <span class="text-muted">

            {{ formatarData(item.ultimoAtendimento) }}

          </span>

        </div>

      </li>

    </ul>

  </div>

</div>
