<div class="position-relative d-inline-block" #dropdownRef>

  <!-- Campo principal -->
  <div class="d-flex align-items-center gap-2  rounded px-2 py-1"
       (click)="toggle($event)"
       style="cursor: pointer; min-width: 220px; flex-wrap: wrap;">

    <i class="fas fa-tag"
       [class.text-primary]="selecionadas.length"></i>

  <!-- Sempre mostra -->
<span class="text-muted" *ngIf="selecionadas.length === 0">
  Etiquetas
</span>

<!-- Quando tiver selecionadas -->
<span *ngFor="let et of selecionadas"
      class="badge"
      [style.background]="et.cor"
      [style.color]="'#fff'"
      (click)="remover(et); $event.stopPropagation()"
      style="cursor: pointer;">
  {{ et.nome }} ✕
</span>

  </div>

  <!-- Dropdown -->
  <div *ngIf="aberto"
       class="dropdown-menu show p-2"
       style="position: absolute; width: 100%;">

    <div *ngFor="let et of etiquetas"
         class="form-check">

      <input type="checkbox"
             class="form-check-input"
             [checked]="isSelecionada(et)"
             (change)="toggleEtiqueta(et)" />

     <label class="form-check-label d-flex align-items-center gap-2">

  <span
    [style.background]="et.cor"
    style="width: 12px; height: 12px; border-radius: 50%; display: inline-block;">
  </span>

  {{ et.nome }}

</label>

    </div>

  </div>

</div>
