<div class="position-relative">
  <label class="form-label">{{ label }}</label>

  <input type="text" class="form-control shadow-sm" [placeholder]="placeholder" [formControl]="control" (input)="onBuscar()"
    (focus)="mostrarSugestoes = true" (blur)="ocultarComDelay()" />

  <!-- Sugestões -->
  <ul *ngIf="mostrarSugestoes && resultados.length > 0"
    class="list-group position-absolute w-100 shadow-sm mt-1 zindex-dropdown">

    <li *ngFor="let p of resultados"
      class="list-group-item list-group-item-action d-flex justify-content-between align-items-center hover-click"
      (mousedown)="selecionar(p)">
      <div class="d-flex flex-column flex-grow-1">
       <strong>{{ p.nome }}</strong>  Documento: {{ formatarDocumento(p.documento) }}
       </div>
      <i class="fas fa-plus text-primary"></i>
    </li>
  </ul>

  <!-- Selecionados -->
    <div *ngIf="selecionadas.length > 0" class="mt-3">
     <h6 class="text-muted mb-2">Selecionados:</h6>
      <div class="d-flex flex-column gap-2"></div>
<div *ngFor="let p of selecionadas"
  class="d-flex justify-content-between align-items-center mb-2 px-2 py-2 border-bottom">

  <!-- TEXTO -->
  <div class="d-flex flex-column flex-grow-1">
    <strong>{{ p.nome }}</strong>
    <small class="text-muted">Documento: {{ formatarDocumento(p.documento) }}</small>
  </div>

  <!-- BOTÃO -->
  <button type="button"
          class="border-0 bg-transparent p-0 ms-3"
          (click)="remover(p)">
    <i class="fas fa-fw fa-trash-alt text-muted fa-lg"></i>
  </button>

</div>
</div>
